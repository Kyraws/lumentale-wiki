spring.application.name=lumentale-wiki-backend

# Port: 8084 so v4 runs alongside v3 (8083) during the migration.
server.port=${PORT:8084}

# --- Asset root for /data/** (the hybrid resolver's filesystem leg) ----------
# forms/<guid>/menu.png, items/<guid>/icon.png, etc. Resolved against the JVM CWD
# (= repo root via bootRun workingDir). When a path isn't present on disk the
# AssetResolver falls back to the DB manifest (V11 asset/asset_guid).
lumentale.data-dir=${LUMENTALE_DATA_DIR:data/assets}

# Seed source: the phase2 extract JSON (data/seed/*.json). The phase4 layers
# (formulas, logic-graphs, asset manifest) seed from their own dirs when present.
lumentale.seed.dir=${LUMENTALE_SEED_DIR:data/seed}
# Curated name-resolved dataset (tools/build_curated_data.py) — display names.
lumentale.curated.dir=${LUMENTALE_CURATED_DIR:data/curated}
lumentale.seed.phase4-dir=${LUMENTALE_PHASE4_DIR:phase4-complete}
# Seed each table only when it is empty (idempotent backfill).
# Default FALSE in this repo: the game-derived dataset is not distributed here,
# so a fresh clone boots schema-only. If you have staged data/seed + data/curated
# (see README — Data), set LUMENTALE_SEED_ON_EMPTY=true to backfill.
lumentale.seed.on-empty=${LUMENTALE_SEED_ON_EMPTY:false}

# About-page credit links. Set the real URLs via env; empty ones are omitted.
lumentale.credits.game-title=LumenTale: Memories of Trey
lumentale.credits.discord-url=${LUMENTALE_DISCORD_URL:}
lumentale.credits.game-url=${LUMENTALE_GAME_URL:}

# --- HTTP compression ------------------------------------------------------
server.compression.enabled=true
server.compression.mime-types=application/json,text/css,application/javascript,text/javascript,text/html,image/svg+xml
server.compression.min-response-size=1024

# --- Database --------------------------------------------------------------
# v4 targets the redesigned schema (wiki-db) on a fresh database: anidex4.
# Externalize SPRING_DATASOURCE_* for any non-local deployment; the defaults are
# local Docker dev creds only.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/anidex4}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:anidex4}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:anidex4}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- Flyway (v3 owns the schema) -------------------------------------------
# Point Flyway at the single source of truth: wiki-db/migrations (V1..V13).
# Resolved against the JVM CWD (= repo root). No copy lives in this module, so
# the DDL never drifts from the design repo.
spring.flyway.enabled=${LUMENTALE_FLYWAY_ENABLED:true}
spring.flyway.locations=filesystem:wiki-db/migrations
# The cross-module FKs in V13 are declared NOT VALID at seed time, then validated
# after the Seeder runs (see Seeder). Allows out-of-order inserts during seeding.
spring.flyway.baseline-on-migrate=true

spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.indent_output=false

management.endpoints.web.exposure.include=health,info
logging.level.com.lumentale.wiki=INFO
